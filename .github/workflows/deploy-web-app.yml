name: Deploy Web App to GHCR and VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Presentation/Polyglots.Presentation.WebApp/**'
      - 'src/Shared/Polyglots.Shared/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/polyglots-web-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Source Code Checkout
        uses: actions/checkout@v4

      - name: Login in GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Presentation/Polyglots.Presentation.WebApp/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/repos/Polyglots
            git pull origin main
            docker compose -f docker.prod/docker-compose.web.app.yml pull polyglots-web-app
            docker compose -f docker.prod/docker-compose.web.app.yml up -d