services:
  # Simulation of VPS #1
  polyglots-api-vps1:
    image: ghcr.io/edrhdev/polyglots-api:latest
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Redis__Configuration=${REDIS_HOST}:${REDIS_PORT}
    networks:
      - polyglots_network

  # Simulation of VPS #2
  polyglots-api-vps2:
    image: ghcr.io/edrhdev/polyglots-api:latest
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Redis__Configuration=${REDIS_HOST}:${REDIS_PORT}
    networks:
      - polyglots_network

  # Simulation of VPS #3
  polyglots-api-vps3:
    image: ghcr.io/edrhdev/polyglots-api:latest
    ports:
      - "8083:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      - Redis__Configuration=${REDIS_HOST}:${REDIS_PORT}
    networks:
      - polyglots_network

networks:
  polyglots_network:
    name: polyglots_shared_network
    external: true