services:
  polyglots-db:
    image: postgres:18-alpine
    container_name: polyglots-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql
    networks:
      - polyglots_network

volumes:
  postgres_local_data:
    
networks:
  polyglots_network:
    name: polyglots_shared_network
    external: true